  <!-- sparkles -->
  <g fill="#ffd166" opacity=".9">
    <path d="M60 90 l4 10 10 4 -10 4 -4 10 -4 -10 -10 -4 10 -4 Z"/>
    <path d="M730 120 l3 8 8 3 -8 3 -3 8 -3 -8 -8 -3 8 -3 Z"/>
    <path d="M690 350 l3 7 7 3 -7 3 -3 7 -3 -7 -7 -3 7 -3 Z"/>
    <path d="M100 330 l2.5 6 6 2.5 -6 2.5 -2.5 6 -2.5 -6 -6 -2.5 6 -2.5 Z"/>
  </g>
</svg>
