<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2b1a4d"/>
      <stop offset="50%" stop-color="#1b2450"/>
      <stop offset="100%" stop-color="#3a1f45"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#ffd166" stop-opacity=".35"/>
      <stop offset="100%" stop-color="#ffd166" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="h1" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#ffb03a"/><stop offset="100%" stop-color="#e07a10"/></linearGradient>
    <linearGradient id="h2" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#63c8ff"/><stop offset="100%" stop-color="#2d7fd6"/></linearGradient>
    <linearGradient id="h3" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#ff8ec4"/><stop offset="100%" stop-color="#d94b96"/></linearGradient>
    <linearGradient id="h4" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#4b5a86"/><stop offset="100%" stop-color="#1d2440"/></linearGradient>
    <linearGradient id="h5" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#a8ff9e"/><stop offset="100%" stop-color="#3fbf6a"/></linearGradient>
    <linearGradient id="h6" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#c9a2ff"/><stop offset="100%" stop-color="#7b45d6"/></linearGradient>
    <linearGradient id="skin" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#ffe3cc"/><stop offset="100%" stop-color="#f6c9a8"/></linearGradient>
  </defs>

  <rect width="800" height="500" fill="url(#bg)"/>
  <!-- speed lines -->
  <g opacity=".18" stroke="#ffffff" stroke-width="2">
    <line x1="0" y1="60" x2="800" y2="20"/><line x1="0" y1="140" x2="800" y2="90"/>
    <line x1="0" y1="380" x2="800" y2="430"/><line x1="0" y1="460" x2="800" y2="500"/>
  </g>
  <ellipse cx="400" cy="230" rx="380" ry="220" fill="url(#glow)"/>

  <!-- ===== character factory (heads) ===== -->
  <!-- 1: spiky orange (shonen) -->
  <g transform="translate(110,250)">
    <path d="M-58 -6 L-70 -58 L-40 -34 L-30 -78 L-6 -40 L10 -84 L26 -40 L48 -70 L44 -26 L74 -46 L58 -2 Z" fill="url(#h1)"/>
    <ellipse cx="0" cy="8" rx="46" ry="52" fill="url(#skin)"/>
    <path d="M-52 -6 q52 -34 104 0 q-6 -40 -52 -44 q-46 4 -52 44 Z" fill="url(#h1)"/>
    <ellipse cx="-18" cy="10" rx="10" ry="13" fill="#fff"/><circle cx="-17" cy="12" r="7" fill="#2b6cff"/><circle cx="-17" cy="12" r="3" fill="#0b1b3a"/><circle cx="-20" cy="8" r="2.4" fill="#fff"/>
    <ellipse cx="18" cy="10" rx="10" ry="13" fill="#fff"/><circle cx="19" cy="12" r="7" fill="#2b6cff"/><circle cx="19" cy="12" r="3" fill="#0b1b3a"/><circle cx="16" cy="8" r="2.4" fill="#fff"/>
    <path d="M-8 34 q8 8 16 0" stroke="#b5615a" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M-30 -4 q12 -7 22 -1 M8 -5 q10 -6 22 1" stroke="#8a4a12" stroke-width="4" fill="none" stroke-linecap="round"/>
  </g>

  <!-- 2: blue long hair -->
  <g transform="translate(270,215)">
    <path d="M-62 40 q-12 -96 62 -96 q74 0 62 96 q-14 -46 -62 -46 q-48 0 -62 46 Z" fill="url(#h2)"/>
    <ellipse cx="0" cy="4" rx="44" ry="50" fill="url(#skin)"/>
    <path d="M-52 -6 q10 -44 52 -44 q42 0 52 44 q-24 -22 -52 -22 q-28 0 -52 22 Z" fill="url(#h2)"/>
    <ellipse cx="-17" cy="6" rx="10" ry="13" fill="#fff"/><circle cx="-16" cy="8" r="7" fill="#7a3fd6"/><circle cx="-16" cy="8" r="3" fill="#180b2e"/><circle cx="-19" cy="4" r="2.4" fill="#fff"/>
    <ellipse cx="17" cy="6" rx="10" ry="13" fill="#fff"/><circle cx="18" cy="8" r="7" fill="#7a3fd6"/><circle cx="18" cy="8" r="3" fill="#180b2e"/><circle cx="15" cy="4" r="2.4" fill="#fff"/>
