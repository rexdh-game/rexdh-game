  <g transform="translate(430,255)">
    <circle cx="-58" cy="-6" r="20" fill="url(#h3)"/><circle cx="58" cy="-6" r="20" fill="url(#h3)"/>
    <path d="M-70 6 q-10 44 4 78 M70 6 q10 44 -4 78" stroke="#d94b96" stroke-width="16" fill="none" stroke-linecap="round"/>
    <ellipse cx="0" cy="4" rx="43" ry="49" fill="url(#skin)"/>
    <path d="M-50 -8 q8 -44 50 -44 q42 0 50 44 q-22 -24 -50 -24 q-28 0 -50 24 Z" fill="url(#h3)"/>
    <ellipse cx="-16" cy="6" rx="10" ry="13" fill="#fff"/><circle cx="-15" cy="8" r="7" fill="#e0489a"/><circle cx="-15" cy="8" r="3" fill="#3a0b26"/><circle cx="-18" cy="4" r="2.4" fill="#fff"/>
    <ellipse cx="16" cy="6" rx="10" ry="13" fill="#fff"/><circle cx="17" cy="8" r="7" fill="#e0489a"/><circle cx="17" cy="8" r="3" fill="#3a0b26"/><circle cx="14" cy="4" r="2.4" fill="#fff"/>
