  <g transform="translate(590,225)">
    <path d="M-56 -4 q4 -56 56 -56 q52 0 56 56 q-18 -34 -56 -34 q-38 0 -56 34 Z" fill="url(#h4)"/>
    <ellipse cx="0" cy="6" rx="44" ry="50" fill="url(#skin)"/>
    <path d="M-52 -8 q14 -40 52 -40 q38 0 52 40 q-26 -18 -52 -18 q-26 0 -52 18 Z" fill="url(#h4)"/>
    <ellipse cx="-17" cy="8" rx="10" ry="12" fill="#fff"/><circle cx="-16" cy="10" r="7" fill="#39d0ff"/><circle cx="-16" cy="10" r="3" fill="#052030"/><circle cx="-19" cy="6" r="2.4" fill="#fff"/>
    <ellipse cx="17" cy="8" rx="10" ry="12" fill="#fff"/><circle cx="18" cy="10" r="7" fill="#39d0ff"/><circle cx="18" cy="10" r="3" fill="#052030"/><circle cx="15" cy="6" r="2.4" fill="#fff"/>
    <path d="M-30 -2 q12 -8 22 -2 M8 -4 q10 -6 22 2" stroke="#0e1428" stroke-width="4" fill="none" stroke-linecap="round"/>
    <path d="M-8 34 q8 5 16 0" stroke="#8f4a45" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M26 -14 l6 26" stroke="#c96a5f" stroke-width="2.5" opacity=".8"/>
  </g>

  <!-- 5: green short (front-left small) -->
  <g transform="translate(190,400) scale(.82)">
    <path d="M-50 -8 q6 -50 50 -50 q44 0 50 50 q-20 -28 -50 -28 q-30 0 -50 28 Z" fill="url(#h5)"/>
    <ellipse cx="0" cy="6" rx="42" ry="48" fill="url(#skin)"/>
    <ellipse cx="-16" cy="8" rx="9.5" ry="12" fill="#fff"/><circle cx="-15" cy="10" r="6.6" fill="#2fae5e"/><circle cx="-15" cy="10" r="2.8" fill="#08230f"/><circle cx="-18" cy="6" r="2.2" fill="#fff"/>
    <ellipse cx="16" cy="8" rx="9.5" ry="12" fill="#fff"/><circle cx="17" cy="10" r="6.6" fill="#2fae5e"/><circle cx="17" cy="10" r="2.8" fill="#08230f"/><circle cx="14" cy="6" r="2.2" fill="#fff"/>
    <path d="M-6 30 q6 7 12 0" stroke="#b5615a" stroke-width="3" fill="none" stroke-linecap="round"/>
  </g>

