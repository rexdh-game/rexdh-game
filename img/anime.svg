  <g transform="translate(520,410) scale(.82)">
    <path d="M-52 8 q-8 -62 52 -62 q60 0 52 62 q-22 -32 -52 -32 q-30 0 -52 32 Z" fill="url(#h6)"/>
    <ellipse cx="0" cy="8" rx="42" ry="48" fill="url(#skin)"/>
    <path d="M-50 -4 q12 -42 50 -42 q38 0 50 42 q-24 -20 -50 -20 q-26 0 -50 20 Z" fill="url(#h6)"/>
    <ellipse cx="-16" cy="10" rx="9.5" ry="12" fill="#fff"/><circle cx="-15" cy="12" r="6.6" fill="#b07bff"/><circle cx="-15" cy="12" r="2.8" fill="#1d0b3a"/><circle cx="-18" cy="8" r="2.2" fill="#fff"/>
    <ellipse cx="16" cy="10" rx="9.5" ry="12" fill="#fff"/><circle cx="17" cy="12" r="6.6" fill="#b07bff"/><circle cx="17" cy="12" r="2.8" fill="#1d0b3a"/><circle cx="14" cy="8" r="2.2" fill="#fff"/>
    <path d="M-6 32 q6 7 12 0" stroke="#b5615a" stroke-width="3" fill="none" stroke-linecap="round"/>
