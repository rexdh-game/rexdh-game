<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'unsafe-inline'; style-src 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' https://flagcdn.com https://cdn.simpleicons.org https://upload.wikimedia.org https://commons.wikimedia.org https://cdn.myanimelist.net https://static.tvmaze.com https://s4.anilist.co data:; font-src https://fonts.gstatic.com; connect-src 'none'; base-uri 'none'; form-action 'none'; object-src 'none'">














<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ريكسد</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  /* ذهبي هادئ (أقل إجهاداً) */
  --or:#e0b252;--or2:#c99a3e;--or-grad:linear-gradient(135deg,#e6c068,#cda046);
  /* خلفيات كحلية هادئة مريحة للعين */
  --dark:#1a2336;--card:#222d44;--deep:#161e30;
  --txt:#dde4f0;--muted:#8794ad;
  --cat-bg:#dcd9cf;
  /* فريق ثاني سماوي هادئ */
  --bl:#6fb6dd;--bl2:#4a9ec9;
  --line:rgba(255,255,255,.06);
  --glow:0 8px 26px rgba(0,0,0,.38);
}
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap');
body{font-family:'Cairo','Segoe UI',Tahoma,Arial,sans-serif;
  background:
    radial-gradient(900px 520px at 15% -10%, rgba(224,178,82,.07), transparent 60%),
    radial-gradient(800px 520px at 100% 110%, rgba(111,182,221,.07), transparent 55%),
    linear-gradient(165deg,#17202f 0%, #1a2336 48%, #161f30 100%);
  background-attachment:fixed;
  color:var(--txt);min-height:100vh;overflow:hidden;height:100vh;display:flex;flex-direction:column;
  -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
::selection{background:rgba(224,178,82,.25)}
/* ===== منحنيات Bugatti: بطيئة البداية، انزلاق فاخر، توقف حريري ===== */
:root{
  --ease-lux:cubic-bezier(.19,1,.22,1);      /* expo-out: انزلاق فاخر */
  --ease-silk:cubic-bezier(.65,.05,.36,1);   /* دخول/خروج حريري */
  --dur-slow:1.4s; --dur-mid:.9s;
}
html{scroll-behavior:smooth}
*{-webkit-tap-highlight-color:transparent}

/* ===== انتقالات الشاشات — أسلوب Bugatti ===== */
.screen{display:none;flex-direction:column;height:100vh;will-change:opacity,transform,filter}
.screen.on{display:flex;animation:screenIn var(--dur-slow) var(--ease-lux)}
@keyframes screenIn{
  0%{opacity:0;transform:translateY(38px) scale(.97);filter:blur(14px) saturate(.6)}
  55%{opacity:1;filter:blur(2px) saturate(.95)}
  100%{opacity:1;transform:translateY(0) scale(1);filter:blur(0) saturate(1)}
}
/* ستارة ضوئية تمسح الشاشة عند التبديل (توقيع Bugatti) */
.screen.on::after{content:'';position:fixed;inset:0;z-index:9998;pointer-events:none;
  background:linear-gradient(105deg,transparent 38%,rgba(224,178,82,.10) 50%,transparent 62%);
  transform:translateX(-100%);animation:sweep 1.5s var(--ease-lux) forwards}
@keyframes sweep{to{transform:translateX(100%)}}

/* الشعار: كشف حرفي متدرّج */
.setup-logo{animation:logoIn 1.6s var(--ease-lux)}
@keyframes logoIn{
  0%{opacity:0;transform:translateY(-20px) scale(.94);letter-spacing:.42em;filter:blur(8px)}
  60%{opacity:1;filter:blur(0)}
  100%{opacity:1;transform:translateY(0) scale(1);letter-spacing:.04em;filter:blur(0)}
}
.setup-logo small{animation:subIn 1.9s var(--ease-lux) both;animation-delay:.35s}
@keyframes subIn{0%{opacity:0;transform:translateY(8px)}100%{opacity:.9;transform:translateY(0)}}

/* ====== SETUP ====== */
#s-setup{align-items:center;justify-content:flex-start;padding:1.5rem 1rem;overflow-y:auto;background:transparent;gap:1.1rem}
.setup-logo{font-size:3rem;font-weight:900;background:var(--or-grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;text-align:center;line-height:1;letter-spacing:.04em;filter:drop-shadow(0 4px 14px rgba(240,180,41,.3))}
.setup-logo small{display:block;font-size:.9rem;font-weight:500;color:var(--muted);margin-top:.4rem;-webkit-text-fill-color:var(--muted)}
.section-title{font-size:.82rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;width:100%;max-width:860px}
.teams-grid{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;width:100%;max-width:860px}
.team-card{background:linear-gradient(165deg,rgba(36,46,77,.7),rgba(26,34,56,.7));backdrop-filter:blur(8px);border-radius:16px;padding:1rem;border:1px solid var(--line);border-top:3px solid;box-shadow:var(--glow)}
.tc1{border-top-color:var(--or)}.tc2{border-top-color:var(--bl)}
.team-card h3{font-size:.9rem;font-weight:700;margin-bottom:.75rem}
.tc1 h3{color:var(--or)}.tc2 h3{color:#60a5fa}
.inp{width:100%;background:rgba(16,22,42,.6);border:1px solid var(--line);border-radius:10px;padding:9px 12px;color:var(--txt);font-size:.88rem;font-family:inherit;direction:rtl;margin-bottom:6px;transition:.15s}
.inp:focus{outline:none;border-color:var(--or);box-shadow:0 0 0 3px rgba(240,180,41,.15)}
.inp::placeholder{color:#566184}
.add-btn{background:transparent;border:1px dashed #444;border-radius:7px;padding:6px;width:100%;color:#555;cursor:pointer;font-family:inherit;font-size:.8rem;transition:.15s}
.add-btn:hover{border-color:var(--or);color:var(--or)}
/* ===== قسملي الفرق ===== */
/* flex-shrink:0 ضروري: #s-setup عمود مرن بارتفاع 100vh، و overflow:hidden هنا
   يُبطل min-height:auto فينسحق الصندوق إلى ٢ بكسل بدون هذا السطر. */
.split-box{width:100%;max-width:860px;margin:0 auto;background:rgba(36,46,77,.28);border:1px solid var(--line);
  border-radius:12px;overflow:hidden;box-shadow:none;flex-shrink:0}
.split-head{width:100%;display:flex;align-items:center;justify-content:space-between;gap:.6rem;
  background:transparent;border:0;padding:.55rem .9rem;cursor:pointer;font-family:inherit;transition:background .35s ease}
.split-head:hover{background:rgba(255,255,255,.045)}
.split-box:not(.closed) .split-head{border-bottom:1px solid var(--line)}
.split-title{color:var(--muted);font-size:.85rem;font-weight:700;display:flex;align-items:center;gap:.45rem}
.split-head:hover .split-title{color:var(--txt)}
.split-opt{font-size:.62rem;font-weight:700;color:var(--muted);background:rgba(255,255,255,.06);
  border-radius:99px;padding:.1rem .4rem}
.split-chev{color:var(--muted);font-size:1.1rem;line-height:1;transition:transform .55s var(--ease-lux), color .35s ease}
.split-head:hover .split-chev{color:var(--or)}
.split-box.closed .split-chev{transform:rotate(-90deg)}
/* لا max-height ثابتة: عدد اللاعبين غير محدود، وتوليفة JS تحسب الارتفاع.
   none هنا تضمن ظهور المحتوى كاملاً حتى لو تعطّل JS. */
.split-body{padding:1rem 1.1rem 1.15rem;display:grid;gap:.7rem;overflow:hidden;
  transition:max-height .7s var(--ease-lux), opacity .45s ease, padding .5s ease;max-height:none;opacity:1}
.split-box.closed .split-body{max-height:0;opacity:0;padding-top:0;padding-bottom:0}
.split-label{text-align:center;color:var(--txt);font-weight:800;font-size:.95rem}
.split-step{display:flex;align-items:center;justify-content:space-between;gap:.8rem;
  background:rgba(0,0,0,.28);border:1.5px solid var(--line);border-radius:99px;padding:.32rem}
.stp{width:38px;height:38px;flex:0 0 38px;border-radius:50%;border:0;cursor:pointer;font-family:inherit;
  font-size:1.35rem;font-weight:900;line-height:1;display:flex;align-items:center;justify-content:center;
  background:var(--or-grad);color:#1a2336;transition:transform .4s var(--ease-lux), filter .3s ease, opacity .3s ease}
.stp:hover:not(:disabled){transform:scale(1.12)}
.stp:active:not(:disabled){transform:scale(.92)}
.stp:disabled{background:#333d55;color:#6b768f;cursor:not-allowed;opacity:.55}
.stp-num{flex:1;text-align:center;color:var(--txt);font-size:1.3rem;font-weight:900;font-variant-numeric:tabular-nums}
.split-names{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:.5rem}
.split-names .inp{margin:0}
.split-go{background:linear-gradient(135deg,#5fc98b,#43a96c);color:#0f2418;border:0;border-radius:99px;
  padding:.55rem 1rem;font-family:inherit;font-size:.92rem;font-weight:800;cursor:pointer;
  justify-self:center;min-width:180px;box-shadow:0 5px 16px rgba(67,169,108,.2);
  transition:transform .5s var(--ease-lux), box-shadow .5s var(--ease-lux), filter .3s ease}
.split-go:hover{transform:translateY(-2px) scale(1.03);box-shadow:0 10px 24px rgba(67,169,108,.34)}
.split-go:active{transform:scale(.97)}
.split-result{display:none;gap:.6rem;grid-template-columns:1fr 1fr}
.split-result.on{display:grid;animation:cardIn .8s var(--ease-lux)}
.split-res-card{background:rgba(0,0,0,.25);border:1px solid var(--line);border-radius:12px;padding:.6rem .75rem}
.split-res-card h4{margin:0 0 .35rem;font-size:.9rem;color:var(--or)}
.split-res-card ul{margin:0;padding:0;list-style:none;display:grid;gap:.22rem}
.split-res-card li{color:var(--txt);font-size:.88rem;background:rgba(255,255,255,.04);border-radius:7px;padding:.2rem .45rem}
@media(max-width:560px){.split-result.on{grid-template-columns:1fr}}
.pl-row{display:flex;gap:5px;margin-bottom:5px;align-items:stretch}
.pl-row .inp{flex:1;margin-bottom:0;font-size:.82rem;padding:7px 10px}
.pl-del{background:#3a3a3a;border:1px solid #555;color:var(--muted);width:32px;border-radius:6px;cursor:pointer;font-size:1.1rem;line-height:1;flex-shrink:0;font-weight:700;transition:.15s;font-family:inherit}
.pl-del:hover{background:#7a1f1f;border-color:#ef4444;color:#fff}

/* category picker */
.cat-picker{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;width:100%;max-width:860px}
/* ===== بطاقات الفئات — أسلوب Bugatti ===== */
.cp-card{background:rgba(36,46,77,.5);border-radius:14px;padding:0;text-align:center;cursor:pointer;
  border:1.5px solid var(--line);user-select:none;overflow:hidden;position:relative;
  transition:transform .75s var(--ease-lux), box-shadow .75s var(--ease-lux), border-color .5s ease;
  opacity:0;animation:cardIn 1.05s var(--ease-lux) forwards;will-change:transform,opacity}
@keyframes cardIn{
  0%{opacity:0;transform:translateY(26px) scale(.94);filter:blur(6px)}
  100%{opacity:1;transform:translateY(0) scale(1);filter:blur(0)}
}
/* لمعة تمرّ على البطاقة عند المرور (توقيع فاخر) */
.cp-card::after{content:'';position:absolute;inset:0;z-index:3;pointer-events:none;
  background:linear-gradient(115deg,transparent 40%,rgba(255,255,255,.13) 50%,transparent 60%);
  transform:translateX(-130%);transition:transform 1.1s var(--ease-lux)}
.cp-card:hover::after{transform:translateX(130%)}
.cp-card .cp-ico{height:62px;overflow:hidden;position:relative;background:#0f1626}
.cp-img{width:100%;height:62px;object-fit:cover;display:block;
  transition:transform .8s cubic-bezier(.16,1,.3,1), filter .5s ease;
  filter:saturate(.85) brightness(.82);
  animation:cpDrift 14s ease-in-out infinite alternate}
@keyframes cpDrift{0%{transform:scale(1.02)}100%{transform:scale(1.09)}}
.cp-card:hover .cp-img{animation-play-state:paused}
/* رسومات بخلفية شفافة: تظهر كاملة بلا قصّ، بهامش صغير وبدون تعتيم */
.cp-img.fit-contain{object-fit:contain;padding:5px 4px;filter:none;
  background:radial-gradient(ellipse at center,rgba(255,255,255,.05),transparent 70%)}
.cat-img.fit-contain{object-fit:contain;padding:10px;filter:none;
  background:radial-gradient(ellipse at center,rgba(255,255,255,.05),transparent 72%)}
.cp-img-fb{height:62px;display:flex;align-items:center;justify-content:center;font-size:1.9rem}
.cp-card:hover{transform:translateY(-6px);border-color:rgba(255,255,255,.28);box-shadow:0 14px 34px rgba(0,0,0,.45)}
.cp-card:hover .cp-img{transform:scale(1.14);filter:saturate(1.1) brightness(1)}
.cp-card .cp-name{font-size:.7rem;color:var(--muted);line-height:1.3;padding:.4rem .3rem;transition:color .3s}
.cp-card.sel{border-color:var(--or);box-shadow:0 0 0 1px rgba(240,180,41,.45),0 10px 28px rgba(240,180,41,.2)}
.cp-card.sel .cp-img{filter:saturate(1.15) brightness(1.05)}
.cp-card.sel .cp-name{color:var(--or);font-weight:700;background:linear-gradient(160deg,rgba(240,180,41,.16),rgba(240,180,41,.04))}
.cp-card.sel::after{content:'✓';position:absolute;top:5px;left:6px;width:19px;height:19px;border-radius:50%;
  background:var(--or-grad);color:#2a1e04;font-size:.68rem;font-weight:900;display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 8px rgba(0,0,0,.4);animation:pop .35s cubic-bezier(.34,1.56,.64,1)}
@keyframes pop{from{transform:scale(0)}to{transform:scale(1)}}
.sel-hint{font-size:.78rem;color:var(--muted);text-align:center}
.sel-hint span{color:var(--or);font-weight:700}

/* setup bottom */
.setup-opts{background:linear-gradient(165deg,rgba(36,46,77,.6),rgba(26,34,56,.6));backdrop-filter:blur(8px);border:1px solid var(--line);border-radius:14px;padding:.85rem 1.1rem;width:100%;max-width:860px;display:flex;align-items:center;gap:1.25rem;flex-wrap:wrap;box-shadow:var(--glow)}
.setup-opts label{color:var(--muted);font-size:.82rem}
.setup-opts select{background:rgba(16,22,42,.7);border:1px solid var(--line);border-radius:8px;padding:6px 10px;color:var(--txt);font-family:inherit;font-size:.82rem;cursor:pointer}
.setup-opts select:focus{outline:none;border-color:var(--or)}
.start-btn{width:100%;max-width:860px;padding:14px;background:var(--or-grad);border:none;border-radius:14px;color:#3a2a05;font-size:1.1rem;font-weight:900;cursor:pointer;font-family:inherit;transition:.2s;box-shadow:0 6px 20px rgba(240,180,41,.35);letter-spacing:.02em}
.start-btn:hover{transform:translateY(-2px);box-shadow:0 10px 28px rgba(240,180,41,.5)}
.start-btn:active{transform:translateY(0)}

/* ====== BOARD ====== */
#s-board{background:transparent}
.b-header{background:rgba(16,22,42,.75);backdrop-filter:blur(12px);border-bottom:1px solid var(--line);padding:.55rem 1rem;display:flex;align-items:center;gap:.6rem;flex-shrink:0}
.b-logo{background:var(--or-grad);border-radius:10px;padding:.28rem .7rem;font-size:1.1rem;font-weight:900;color:#3a2a05;flex-shrink:0;box-shadow:0 3px 12px rgba(240,180,41,.3);letter-spacing:.03em}
.turn-pill{background:var(--or-grad);border-radius:20px;padding:.28rem .95rem;font-size:.82rem;font-weight:800;white-space:nowrap;flex-shrink:0;color:#3a2a05;box-shadow:0 2px 10px rgba(240,180,41,.2);cursor:default;transition:.15s;user-select:none}
/* شارة "نقاط مضاعفة مُفعّلة" — تنتظر السؤال القادم */
.dbl-pending{display:none}
.dbl-pending.on{display:block;background:linear-gradient(135deg,#8b5cf6,#6d28d9);color:#fff;
  border-radius:20px;padding:.28rem .8rem;font-size:.76rem;font-weight:800;white-space:nowrap;
  flex-shrink:0;box-shadow:0 2px 12px rgba(124,58,237,.45);animation:dblPulse 1.6s ease-in-out infinite}
@keyframes dblPulse{0%,100%{box-shadow:0 2px 12px rgba(124,58,237,.45)}50%{box-shadow:0 2px 20px rgba(124,58,237,.85)}}
.turn-pill:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(240,180,41,.35)}
.turn-pill.t2{background:linear-gradient(135deg,#7ecbf0,#3ba3d6);color:#06283a;box-shadow:0 2px 10px rgba(56,189,248,.22)}
.turn-pill.t2:hover{box-shadow:0 4px 14px rgba(56,189,248,.35)}
.h-mid{flex:1;text-align:center;font-size:.9rem;color:var(--muted)}
.h-ctrl{display:flex;align-items:center;gap:.5rem;flex-shrink:0}
.h-btn{background:rgba(255,255,255,.04);border:1px solid var(--line);color:var(--muted);cursor:pointer;font-family:inherit;font-size:.8rem;padding:.35rem .65rem;border-radius:9px;display:flex;align-items:center;gap:.3rem;transition:.15s}
.h-btn:hover{color:var(--txt);background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.2)}

.b-main{flex:1;overflow:hidden;display:flex;flex-direction:column;gap:6px;padding:7px 8px}
.board-section{display:grid;gap:6px;flex:1}
.score-col{display:flex;flex-direction:column;gap:5px}
.score-btn{flex:1;background:linear-gradient(145deg,#243150,#1a2238);border:1px solid var(--line);border-radius:12px;color:var(--or);font-size:1.4rem;font-weight:900;cursor:pointer;font-family:inherit;box-shadow:inset 0 1px 0 rgba(255,255,255,.04);
  position:relative;overflow:hidden;
  transition:transform .6s var(--ease-lux), box-shadow .6s var(--ease-lux), background .45s ease;
  opacity:0;animation:btnIn .8s var(--ease-lux) forwards}
@keyframes btnIn{0%{opacity:0;transform:translateY(14px) scale(.9)}100%{opacity:1;transform:translateY(0) scale(1)}}
.score-btn::before{content:'';position:absolute;inset:0;background:linear-gradient(120deg,transparent 30%,rgba(240,180,41,.14) 50%,transparent 70%);
  transform:translateX(-120%);transition:transform 1.1s var(--ease-lux)}
.score-btn:hover::before{transform:translateX(120%)}
.score-btn:hover{background:linear-gradient(145deg,#2c3a5e,#212c48);transform:scale(1.05) translateY(-2px);box-shadow:0 10px 26px rgba(0,0,0,.45),0 0 0 1px rgba(240,180,41,.5)}
.score-btn:active{transform:scale(.96)}
.score-btn.used{background:rgba(255,255,255,.015);color:rgba(255,255,255,.06);cursor:default;pointer-events:none;box-shadow:none;border-color:transparent}
/* ===== أعمدة الفئات في اللوحة — صور سينمائية ===== */
.cat-col{background:#0f1626;border-radius:14px;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;
  padding:0;overflow:hidden;box-shadow:0 6px 20px rgba(0,0,0,.35);position:relative;
  transition:transform .75s var(--ease-lux), box-shadow .75s var(--ease-lux);
  opacity:0;animation:catIn 1.15s var(--ease-lux) forwards;will-change:transform,opacity}
@keyframes catIn{
  0%{opacity:0;transform:scale(.9) translateY(18px);filter:blur(8px)}
  100%{opacity:1;transform:scale(1) translateY(0);filter:blur(0)}
}
.cat-col::after{content:'';position:absolute;inset:0;pointer-events:none;
  background:linear-gradient(to top,rgba(10,15,26,.95) 0%,rgba(10,15,26,.45) 40%,rgba(10,15,26,.1) 100%)}
.cat-col:hover{transform:translateY(-4px);box-shadow:0 14px 34px rgba(0,0,0,.5)}
.cat-emoji{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;overflow:hidden}
/* صور اللوحة: حركة سينمائية حيّة (Ken Burns) */
.cat-img{width:100%;height:100%;object-fit:cover;display:block;
  transition:filter .6s ease;
  filter:saturate(.9) brightness(.75);
  animation:kenBurns 18s ease-in-out infinite alternate;
  transform-origin:center 35%}
@keyframes kenBurns{
  0%{transform:scale(1.04) translateY(0)}
  100%{transform:scale(1.16) translateY(-2%)}
}
.cat-col:hover .cat-img{filter:saturate(1.1) brightness(1);animation-play-state:paused;transform:scale(1.12)}
/* الرسومات الشفافة: طفو لطيف بدل تقريب كين برنز (كي لا تُقصّ) */
.cat-img.fit-contain{animation:catFloat 9s ease-in-out infinite alternate;transform-origin:center}
@keyframes catFloat{
  0%{transform:translateY(-2px) scale(1)}
  100%{transform:translateY(2px) scale(1.03)}
}
.cat-col:hover .cat-img.fit-contain{transform:scale(1.05);filter:none}
.cp-card:hover .cp-img.fit-contain{filter:none}
/* وهج حي حول الصورة */
.cat-col::before{content:'';position:absolute;inset:0;z-index:1;pointer-events:none;
  background:radial-gradient(circle at 50% 40%, rgba(240,180,41,.14), transparent 62%);
  opacity:0;animation:auraPulse 5s ease-in-out infinite}
@keyframes auraPulse{0%,100%{opacity:.25}50%{opacity:.7}}
.cat-img-fb{font-size:3rem;filter:drop-shadow(0 2px 6px rgba(0,0,0,.5))}
.cat-name{position:relative;z-index:2;background:linear-gradient(135deg,rgba(240,180,41,.92),rgba(205,160,70,.92));
  backdrop-filter:blur(4px);border-radius:8px;padding:.28rem .55rem;font-size:.74rem;font-weight:800;color:#2a1e04;
  text-align:center;width:calc(100% - .8rem);margin:.4rem;letter-spacing:.01em;box-shadow:0 3px 10px rgba(0,0,0,.35)}

.b-bottom{background:rgba(16,22,42,.8);backdrop-filter:blur(12px);border-top:1px solid var(--line);padding:.55rem .9rem;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:.75rem}
.b-team{display:flex;align-items:center;gap:.55rem}
.score-ctrl{display:flex;align-items:center;gap:.35rem}
.sc-adj{width:30px;height:30px;border-radius:50%;border:1px solid var(--line);background:rgba(255,255,255,.06);color:var(--txt);font-size:1rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s;line-height:1}
.sc-adj:hover{background:rgba(255,255,255,.16)}
.sc-val{min-width:50px;text-align:center;font-size:1.5rem;font-weight:900}
.ll-group{display:flex;gap:5px}
.ll-btn{width:34px;height:34px;border-radius:50%;border:1.5px solid rgba(255,255,255,.18);background:rgba(255,255,255,.04);cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;transition:all .15s;position:relative}
.ll-btn:hover:not([disabled]){border-color:var(--or);transform:scale(1.12);box-shadow:0 0 12px rgba(240,180,41,.4)}
.ll-btn[disabled]{opacity:.2;cursor:not-allowed;border-color:#333}
.ll-label{font-size:.65rem;color:var(--muted);white-space:nowrap}
.team-pill{background:var(--or-grad);border-radius:18px;padding:.28rem .95rem;font-size:.85rem;font-weight:800;cursor:pointer;user-select:none;color:#3a2a05;transition:.15s;box-shadow:0 2px 10px rgba(240,180,41,.25)}
.team-pill:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(240,180,41,.4)}
.b-team:last-child .team-pill{background:linear-gradient(135deg,#5cc9fb,#0ea5e9);color:#04263a;box-shadow:0 2px 10px rgba(56,189,248,.3)}

/* ====== QUESTION OVERLAY ====== */
#q-ov{position:fixed;inset:0;background:rgba(8,12,24,.82);backdrop-filter:blur(6px);display:none;align-items:center;justify-content:center;z-index:100;padding:1rem;animation:ovIn .7s var(--ease-silk)}
@keyframes ovIn{0%{opacity:0;backdrop-filter:blur(0);background:rgba(8,12,24,0)}100%{opacity:1}}
.q-modal{background:linear-gradient(165deg,#232e4d,#1a2238);border-radius:22px;padding:1.75rem 2rem;max-width:680px;width:100%;border:1px solid rgba(255,255,255,.08);box-shadow:0 24px 70px rgba(0,0,0,.6),0 0 0 1px rgba(240,180,41,.15);position:relative;overflow:hidden;
  animation:modalIn 1.05s var(--ease-lux);will-change:transform,opacity}
@keyframes modalIn{
  0%{opacity:0;transform:translateY(46px) scale(.9);filter:blur(12px)}
  60%{opacity:1;filter:blur(0)}
  100%{opacity:1;transform:translateY(0) scale(1);filter:blur(0)}
}
/* الشريط الذهبي يُرسم من اليمين لليسار — لمسة Bugatti */
.q-modal::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:var(--or-grad);
  transform-origin:right;animation:lineDraw 1.2s var(--ease-lux) .15s both}
@keyframes lineDraw{0%{transform:scaleX(0)}100%{transform:scaleX(1)}}
.q-timer-wrap{margin-bottom:.9rem}
.q-timer-bar{height:8px;background:rgba(0,0,0,.35);border-radius:99px;overflow:hidden}
.q-timer-fill{height:100%;border-radius:99px;transition:width 1s linear,background .3s;background:var(--or);box-shadow:0 0 10px rgba(240,180,41,.5)}
.q-timer-lbl{font-size:.75rem;color:var(--muted);text-align:left;margin-top:.25rem}
.q-pts-lbl{font-size:1.45rem;font-weight:900;background:var(--or-grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;text-align:center;margin-bottom:.15rem}
.q-cat-tag{font-size:.78rem;color:var(--muted);text-align:center;margin-bottom:1rem}
.q-vis{font-size:5rem;text-align:center;line-height:1;margin-bottom:.7rem;display:none}
.q-vis.on{display:flex;justify-content:center;align-items:center}
.q-vis img{max-width:280px;max-height:250px;width:auto;object-fit:contain;border-radius:10px;box-shadow:0 4px 16px rgba(0,0,0,.5);border:2px solid #555}
.q-vis img.logo-img{background:#fff;padding:14px;object-fit:contain;max-height:130px}
.q-txt{font-size:1.35rem;font-weight:700;text-align:center;line-height:1.5;color:var(--txt);margin-bottom:1.25rem}
.q-opts{display:none;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:1.1rem}
.q-opts.visible{display:grid}
.q-answer-box{display:none;background:rgba(34,90,58,.35);border:1.5px solid rgba(74,222,128,.4);border-radius:12px;padding:14px 20px;font-size:1.18rem;font-weight:700;color:#86efac;text-align:center;margin-bottom:.9rem;animation:fadeIn .3s ease}
.q-answer-box.on{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.q-opt{padding:12px 15px;background:var(--deep);border:1.5px solid #444;border-radius:11px;font-size:.98rem;color:var(--txt);display:flex;align-items:center;gap:7px;transition:all .2s;cursor:default}
.q-opt .ol{width:24px;height:24px;border-radius:50%;background:#333;display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:700;color:var(--muted);flex-shrink:0}
.q-opt.ok{background:#14532d;border-color:#22c55e;color:#86efac}.q-opt.ok .ol{background:#22c55e;color:#fff}
.q-opt.no{background:#450a0a;border-color:#ef4444;color:#fca5a5;opacity:.55}.q-opt.no .ol{background:#ef4444;color:#fff}
.q-dbl{display:none;text-align:center;background:#7c3aed;border-radius:7px;padding:3px 10px;font-size:.75rem;font-weight:700;margin-bottom:.5rem}
.q-dbl.on{display:block}
.q-ll-bar{display:grid;grid-template-columns:1fr 1fr;gap:.5rem;margin-bottom:.9rem;padding:.55rem;background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:12px}
.q-ll-team{display:flex;flex-direction:column;gap:.3rem;align-items:center}
.q-ll-team .team-label{font-size:.72rem;font-weight:800}
.q-ll-team.t1 .team-label{color:var(--or)}
.q-ll-team.t2 .team-label{color:var(--bl)}
.q-ll-btns{display:flex;gap:.35rem;justify-content:center;flex-wrap:wrap}
.q-ll-btn{width:38px;height:38px;border-radius:50%;border:2px solid rgba(255,255,255,.18);background:rgba(255,255,255,.05);cursor:pointer;font-size:1.05rem;display:flex;align-items:center;justify-content:center;transition:.15s;color:#fff;font-family:inherit;padding:0}
.q-ll-btn:hover:not(:disabled){transform:scale(1.12);border-color:rgba(255,255,255,.4)}
.q-ll-team.t1 .q-ll-btn:hover:not(:disabled){border-color:var(--or);box-shadow:0 0 12px rgba(240,180,41,.4)}
.q-ll-team.t2 .q-ll-btn:hover:not(:disabled){border-color:var(--bl);box-shadow:0 0 12px rgba(56,189,248,.4)}
.q-ll-btn:disabled{opacity:.25;cursor:not-allowed;border-color:#333}
.q-ll-btn.used{background:rgba(0,0,0,.3);color:#444}
.q-acts{display:flex;gap:.6rem}
.qa{flex:1;padding:12px 8px;border:none;border-radius:12px;font-size:.9rem;font-weight:800;cursor:pointer;font-family:inherit;transition:.18s;box-shadow:0 3px 12px rgba(0,0,0,.25)}
.qa:hover:not(:disabled){transform:translateY(-2px)}
.qa:disabled{opacity:.3;cursor:not-allowed}
.qa-rev{background:linear-gradient(135deg,#a78bfa,#7c3aed);color:#fff}
.qa-t1{background:var(--or-grad);color:#3a2a05}
.qa-t2{background:linear-gradient(135deg,#5cc9fb,#0ea5e9);color:#04263a}
.qa-sk{background:rgba(255,255,255,.07);color:var(--muted);box-shadow:none}.qa-sk:hover{color:var(--txt);background:rgba(255,255,255,.14)}

/* ====== POLL ====== */
.poll-ov{position:fixed;inset:0;background:rgba(0,0,0,.88);display:none;align-items:center;justify-content:center;z-index:200}
.poll-card{background:var(--card);border-radius:18px;padding:1.5rem;max-width:380px;width:90%;text-align:center;border-top:4px solid var(--or)}
.poll-title{font-size:.95rem;font-weight:700;color:var(--or);margin-bottom:1rem}
.poll-row{display:flex;align-items:center;gap:7px;margin-bottom:7px}
.poll-l{width:20px;font-size:.75rem;font-weight:700;color:var(--muted);text-align:center;flex-shrink:0}
.poll-bw{flex:1;background:var(--deep);border-radius:99px;height:20px;overflow:hidden}
.poll-b{height:100%;border-radius:99px;width:0%;transition:width 1.2s cubic-bezier(.4,0,.2,1);display:flex;align-items:center;justify-content:flex-end;padding-right:7px;font-size:.72rem;font-weight:700;color:#fff}
.poll-p{min-width:32px;text-align:left;font-size:.82rem;font-weight:700}
.poll-close{margin-top:.9rem;padding:9px 24px;background:var(--or);border:none;border-radius:9px;color:#fff;font-weight:700;cursor:pointer;font-family:inherit}

/* ====== RESULT ====== */
#s-result{align-items:center;justify-content:center;background:transparent}
.res-card{background:linear-gradient(165deg,#232e4d,#1a2238);border:1px solid rgba(255,255,255,.08);border-radius:22px;padding:2rem;max-width:480px;width:90%;text-align:center;box-shadow:0 24px 70px rgba(0,0,0,.6),0 0 0 1px rgba(240,180,41,.15)}
.res-ico{font-size:3.4rem;margin-bottom:.4rem;filter:drop-shadow(0 4px 12px rgba(240,180,41,.4))}
.res-win{font-size:1.9rem;font-weight:900;margin-bottom:.2rem}
.res-sub{color:var(--muted);margin-bottom:1.4rem;font-size:.92rem}
.final-row{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-bottom:1.4rem}
.fb{border-radius:14px;padding:1.1rem;border:1px solid var(--line);background:rgba(255,255,255,.03)}
.fb1{border-top:3px solid var(--or)}.fb2{border-top:3px solid var(--bl)}
.fb-n{font-size:.8rem;margin-bottom:.25rem;font-weight:700}
.fb1 .fb-n{color:var(--or)}.fb2 .fb-n{color:var(--bl)}
.fb-s{font-size:2.6rem;font-weight:900}
.fb1 .fb-s{color:var(--or)}.fb2 .fb-s{color:var(--bl)}
.res-btns{display:flex;gap:.6rem;justify-content:center}
.rb{padding:11px 22px;border-radius:11px;font-size:.92rem;font-weight:800;cursor:pointer;font-family:inherit;border:none;transition:.18s}
.rb:hover{transform:translateY(-2px)}
.rb-or{background:var(--or-grad);color:#3a2a05;box-shadow:0 4px 14px rgba(240,180,41,.35)}
.rb-dk{background:rgba(255,255,255,.07);color:var(--txt);border:1px solid var(--line)}.rb-dk:hover{background:rgba(255,255,255,.14)}

/* misc */
.pts-pop{position:fixed;pointer-events:none;font-size:2.2rem;font-weight:900;animation:popUp .9s ease forwards;z-index:300}
@keyframes popUp{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-80px) scale(1.5)}}
.toast-el{position:fixed;bottom:5rem;left:50%;transform:translateX(-50%);padding:8px 18px;border-radius:9px;font-weight:700;font-size:.85rem;z-index:400;animation:popUp .9s ease forwards;white-space:nowrap;color:#fff}
</style>
</head>
<body>

<!-- ====== SETUP ====== -->
<div id="s-setup" class="screen on">
  <div class="setup-logo">ريكسد<small>اختار الفئات وابدأ اللعبة</small></div>

  <div class="section-title">الفرق</div>
  <div class="teams-grid">
    <div class="team-card tc1">
      <h3>🔴 الفريق الأول</h3>
      <input class="inp" id="t1name" placeholder="اسم الفريق..." value="">
      <div id="t1pls">
        <div class="pl-row"><input class="inp" placeholder="اسم اللاعب 1"><button class="pl-del" onclick="rmPl(this)" title="حذف اللاعب">×</button></div>
        <div class="pl-row"><input class="inp" placeholder="اسم اللاعب 2"><button class="pl-del" onclick="rmPl(this)" title="حذف اللاعب">×</button></div>
      </div>
      <button class="add-btn" onclick="addPl(1)">+ أضف لاعب</button>
    </div>
    <div class="team-card tc2">
      <h3>🔵 الفريق الثاني</h3>
      <input class="inp" id="t2name" placeholder="اسم الفريق..." value="">
      <div id="t2pls">
        <div class="pl-row"><input class="inp" placeholder="اسم اللاعب 1"><button class="pl-del" onclick="rmPl(this)" title="حذف اللاعب">×</button></div>
        <div class="pl-row"><input class="inp" placeholder="اسم اللاعب 2"><button class="pl-del" onclick="rmPl(this)" title="حذف اللاعب">×</button></div>
      </div>
      <button class="add-btn" onclick="addPl(2)">+ أضف لاعب</button>
    </div>
  </div>

  <!-- أداة اختيارية: مقسّم فرق عشوائي. مطوية افتراضياً — ليست خطوة في اللعب -->
  <div class="split-box closed" id="split-box">
    <button class="split-head" type="button" onclick="toggleSplit()" aria-expanded="false" aria-controls="split-body">
      <span class="split-title">🎲 قسملي الفرق <span class="split-opt">اختياري</span></span>
      <span class="split-chev" id="split-chev">⌄</span>
    </button>
    <div class="split-body" id="split-body">
      <div class="split-label">عدد اللاعبين</div>
      <div class="split-step">
        <button class="stp stp-minus" type="button" id="stp-minus" onclick="splitStep(-1)" title="أقل">−</button>
        <span class="stp-num" id="split-count">4</span>
        <button class="stp stp-plus" type="button" onclick="splitStep(1)" title="أكثر">+</button>
      </div>
      <div class="split-names" id="split-names"></div>
      <button class="split-go" type="button" onclick="doSplit()">عطني التقسيمه</button>
      <div class="split-result" id="split-result"></div>
    </div>
  </div>

  <div class="section-title">اختار الفئات <span id="sel-count" style="color:var(--or)">0</span> / 6 مطلوبة</div>
  <div class="cat-picker" id="cat-picker"></div>
  <div class="sel-hint">اختار <span>6</span> فئات بالضبط للعب</div>

  <div class="setup-opts">
    <label>النقاط:</label>
    <select id="base-pts">
      <option value="100">100 / 200 / 300</option>
      <option value="200" selected>200 / 400 / 600</option>
      <option value="500">500 / 1000 / 1500</option>
    </select>
    <label>وقت السؤال:</label>
    <select id="timer-sec">
      <option value="0">بدون وقت</option>
      <option value="20">20 ثانية</option>
      <option value="30" selected>30 ثانية</option>
      <option value="45">45 ثانية</option>
      <option value="60">60 ثانية</option>
    </select>
    <label>مساعدات لكل فريق:</label>
    <select id="ll-count">
      <option value="2">2</option>
      <option value="3" selected>3</option>
      <option value="4">4</option>
    </select>
  </div>
  <button class="start-btn" onclick="startGame()">🚀 ابدأ اللعبة</button>
</div>

<!-- ====== BOARD ====== -->
<div id="s-board" class="screen">
  <div class="b-header">
    <div class="b-logo">ريكسد</div>
    <div class="turn-pill" id="turn-pill" title="يتبدل تلقائياً بعد كل سؤال">🔁 دور: <span id="turn-name">...</span></div>
    <div class="dbl-pending" id="dbl-pending"></div>
    <div class="h-mid" id="h-mid"></div>
    <div class="h-ctrl">
      <button class="h-btn" id="mute-btn" onclick="toggleMute()">🔊 الصوت</button>
      <button class="h-btn" onclick="shuffleQs()">🔀 أسئلة جديدة</button>
      <button class="h-btn" onclick="showResult()">⏹ إنهاء</button>
      <button class="h-btn" onclick="ss('s-setup')">🔙 إعادة</button>
    </div>
  </div>
  <div class="b-main" id="b-main"></div>
  <div class="b-bottom">
    <div class="b-team">
      <div class="team-pill" id="bot-n1" onclick="renameTeam(1)" title="اضغط لتغيير الاسم">الفريق الأول</div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:2px">
        <div class="ll-group" id="ll1"></div>
        <div class="ll-label">مساعدات</div>
      </div>
      <div class="score-ctrl">
        <button class="sc-adj" onclick="adjS(1,-1)">−</button>
        <div class="sc-val" id="bot-s1">0</div>
        <button class="sc-adj" onclick="adjS(1,1)">+</button>
      </div>
    </div>
    <div class="b-team">
      <div class="score-ctrl">
        <button class="sc-adj" onclick="adjS(2,-1)">−</button>
        <div class="sc-val" id="bot-s2">0</div>
        <button class="sc-adj" onclick="adjS(2,1)">+</button>
      </div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:2px">
        <div class="ll-group" id="ll2"></div>
        <div class="ll-label">مساعدات</div>
      </div>
      <div class="team-pill" id="bot-n2" onclick="renameTeam(2)" title="اضغط لتغيير الاسم">الفريق الثاني</div>
    </div>
  </div>
</div>

<!-- ====== QUESTION OVERLAY ====== -->
<div id="q-ov" style="position:fixed;inset:0;background:rgba(0,0,0,.88);display:none;align-items:center;justify-content:center;z-index:100;padding:1rem">
  <div class="q-modal">
    <div class="q-timer-wrap" id="timer-wrap">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.3rem">
        <div class="q-timer-phase" id="timer-phase" style="font-size:.78rem;font-weight:700;padding:.15rem .6rem;border-radius:99px;background:#444;color:#fff"></div>
        <div style="font-size:.78rem;color:var(--muted)"><span id="timer-lbl">30</span> ثانية</div>
      </div>
      <div class="q-timer-bar"><div class="q-timer-fill" id="timer-fill" style="width:100%"></div></div>
    </div>
    <div class="q-dbl" id="q-dbl">✦ نقاط مضاعفة!</div>
    <div class="q-ll-bar" id="q-ll-bar"></div>
    <div class="q-pts-lbl" id="q-pts">200 نقطة</div>
    <div class="q-cat-tag" id="q-cat">الفئة</div>
    <div class="q-vis" id="q-vis"></div>
    <div class="q-txt" id="q-txt">...</div>
    <div class="q-opts" id="q-opts"></div>
    <div class="q-answer-box" id="q-answer-box"></div>
    <div class="q-acts">
      <button class="qa qa-rev" id="qa-rev" onclick="revealAns()">👁 اكشف</button>
      <button class="qa qa-t1" id="qa-t1" onclick="givePoint(1)" disabled></button>
      <button class="qa qa-t2" id="qa-t2" onclick="givePoint(2)" disabled></button>
      <button class="qa qa-sk" onclick="closeQ()">✕ أغلق</button>
    </div>
  </div>
</div>

<!-- ====== RESULT ====== -->
<div id="s-result" class="screen">
  <div class="res-card">
    <div class="res-ico" id="r-ico">🏆</div>
    <div class="res-win" id="r-win"></div>
    <div class="res-sub" id="r-sub"></div>
    <div class="final-row">
      <div class="fb fb1"><div class="fb-n" id="r-n1"></div><div class="fb-s" id="r-s1">0</div></div>
      <div class="fb fb2"><div class="fb-n" id="r-n2"></div><div class="fb-s" id="r-s2">0</div></div>
    </div>
    <div class="res-btns">
      <button class="rb rb-dk" onclick="ss('s-setup')">⚙ إعدادات</button>
      <button class="rb rb-or" onclick="restartSame()">🔄 نفس الفرق</button>
    </div>
  </div>
